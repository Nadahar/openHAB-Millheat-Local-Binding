actions.milllan.send-reboot.label = Reboot Device
actions.milllan.send-reboot.description = Reboots the Mill device.
actions.milllan.set-api-key.label = Set API Key
actions.milllan.set-api-key.description = Sets a new API key in the device. <strong>Warning:</strong>Once an API key is set, it cannot be "unset" again.<br><br>The device will change the API from HTTP to HTTPS, which is encrypted but slower, and the only way to get the device back to using HTTP is to do a factory reset of the device, which will also reset WiFi settings etc. It is possible to change the API key after it is set, but not to remove it.
actions.milllan.set-cloud-communication.label = Set Cloud Communication
actions.milllan.set-cloud-communication.description = Sets whether cloud communication is enabled for the device. Will reboot the device.
actions.milllan.set-custom-name.label = Set Custom Device Name
actions.milllan.set-custom-name.description = Sets the custom name in the device.
actions.milllan.set-hysteresis-parameters.label = Set Hysteresis Parameters
actions.milllan.set-hysteresis-parameters.description = Sets the hysteresis parameters for the heating controller.
actions.milllan.set-independent-temperature.label = Set Independent Temperature
actions.milllan.set-independent-temperature.description = Sets the "Independent Mode" temperature. Fails if the device is in a different mode.
actions.milllan.set-open-window-parameters.label = Set Open Window Parameters
actions.milllan.set-open-window-parameters.description = Sets the parameters for the open window function.
actions.milllan.set-pid-parameters.label = Set PID Parameters
actions.milllan.set-pid-parameters.description = Sets the PID parameters for the heating controller.
actions.milllan.set-timezone-offset.label = Set Time Zone Offset
actions.milllan.set-timezone-offset.description = Sets the device time zone offset from UTC in minutes.
actions-input.milllan.set-api-key.key.label = API Key
actions-input.milllan.set-api-key.key.description = The new API key, which cannot be blank or longer than 63 characters.
actions-input.milllan.set-cloud-communication.enabled.label = Enabled
actions-input.milllan.set-cloud-communication.enabled.description = The new cloud communication setting.
actions-input.milllan.set-custom-name.custom-name.label = Custom Name
actions-input.milllan.set-custom-name.custom-name.description = The new custom device name (maximum 32 characters) or blank to remove the existing custom name.
actions-input.milllan.set-hysteresis-parameters.upper.label = Hysteresis Upper
actions-input.milllan.set-hysteresis-parameters.upper.description = The upper limit: Set temperature + upper limit = stop heating.
actions-input.milllan.set-hysteresis-parameters.lower.label = Hysteresis Lower
actions-input.milllan.set-hysteresis-parameters.lower.description = The lower limit: Set temperature - lower limit = start heating.
actions-input.milllan.set-independent-temperature.temperature.label = Temperature
actions-input.milllan.set-independent-temperature.temperature.description = The target temperature to set. Special values 0 and 99 means "Off" and "Always On" respectively.
actions-input.milllan.set-open-window-parameters.drop-temp-thr.label = Drop Temperature Threshold
actions-input.milllan.set-open-window-parameters.drop-temp-thr.description = The temperature drop in °C required to trigger (activate) the open window function.
actions-input.milllan.set-open-window-parameters.drop-time-range.label = Drop Time Range
actions-input.milllan.set-open-window-parameters.drop-time-range.description = The time range in seconds for which a drop in temperature will be evaluated.
actions-input.milllan.set-open-window-parameters.inc-temp-thr.label = Increase Temperature Threshold
actions-input.milllan.set-open-window-parameters.inc-temp-thr.description = The temperature increase in °C required to deactivate the open window function.
actions-input.milllan.set-open-window-parameters.inc-time-range.label = Increase Time Range
actions-input.milllan.set-open-window-parameters.inc-time-range.description = The time range in seconds for which a increase in temperature will be evaluated.
actions-input.milllan.set-open-window-parameters.max-time.label = Maximum Time
actions-input.milllan.set-open-window-parameters.max-time.description = The maximum time in seconds the open window function will remain active.
actions-input.milllan.set-pid-parameters.kp.description = The proportional gain factor.
actions-input.milllan.set-pid-parameters.ki.description = The integral gain factor.
actions-input.milllan.set-pid-parameters.kd.description = The derivative gain factor.
actions-input.milllan.set-pid-parameters.kd-filter.label = Kd Filter
actions-input.milllan.set-pid-parameters.kd-filter.description = The derivative filter time coefficient.
actions-input.milllan.set-pid-parameters.windup-limit.label = Wind-up Limit Percent
actions-input.milllan.set-pid-parameters.windup-limit.description = The wind-up limit for the integral part in percent.
actions-input.milllan.set-timezone-offset.offset.label = Offset
actions-input.milllan.set-timezone-offset.offset.description = The offset from UTC in minutes.

